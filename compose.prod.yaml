  backend:
    image: temp-backend:local
    container_name: temp-backend
    environment:
      - DB_USERNAME=123
      - DB_PASSWORD=123
      - SPRING_PROFILES_ACTIVE=prod
    expose:
      - 8080
    depends_on:
      - db
    networks:
      - caddy-network
      - default

networks:
  caddy-network:
    name: caddy-network
    external: true
